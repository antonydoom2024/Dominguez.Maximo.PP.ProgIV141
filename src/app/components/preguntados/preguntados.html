<div class="contenedor-juego text-center" *ngIf="!juegoTerminado && preguntaSeleccionada">

    <h2 class="mt-2 fw-bold text-primary-emphasis">Preguntados</h2>
    <p class="fs-5 text-danger">Puntuación: <strong>{{ puntuacion }}</strong></p>
    
    <h3 class="fw-bold text-start p-4 text-danger-emphasis">{{ preguntaSeleccionada.question }}</h3>
    
    <div class="opciones-grid mt-2">
        <button *ngFor="let opcion of answers" 
                (click)="seleccionarRespuesta(opcion)" [innerHTML]
                class="btn btn-primary me-2"
                data-bs-toggle="modal" data-bs-target="#preguntaModal">
        {{ opcion }}
        </button>
    </div>
</div>

<div *ngIf="juegoTerminado" class="pantalla-fin text-center">
  <h2 class="mt-3 fw-bold text-primary-emphasis">¡Juego Terminado!</h2>
  <p class="fs-4 text-danger-emphasis">Puntuación final: <strong>{{ puntuacion }}</strong></p>
  <button (click)="reiniciarJuego()" class="btn btn-primary fs-4 mt-5">Reiniciar</button>
</div>

<div class="modal fade" id="preguntaModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-body">
        <p class="fs-3 text-danger-emphasis">{{ resultado }}</p>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continuar</button>
      </div>
    </div>
  </div>
</div>
